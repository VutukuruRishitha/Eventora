<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Eventora</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
  <!-- LOGIN -->
  <div id="loginPage" class="login-wrapper">
    <div class="login-left"></div>

    <div class="login-right">
      <div class="container">
        <h2 id="formTitle">Login</h2>
        <input type="text" id="username" placeholder="Username" />
        <input type="password" id="password" placeholder="Password" />
        <button onclick="handleAuth()">Submit</button>
        <p class="toggleText" onclick="toggleForm()">Create Account</p>
      </div>
    </div>
  </div>

  <!-- HOME -->
  <div id="homePage" class="home">
    <div class="navbar">
      <h2>Eventora</h2>
      <div>
        <button onclick="showHistory()">History</button>
        <button onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="banner"></div>

    <h2 class="title">Explore Events</h2>
    <div class="events" id="eventsContainer"></div>
  </div>

  <!-- TICKET -->
  <div id="ticketPage" class="home">
    <div class="navbar">
      <h2>Eventora</h2>
      <button onclick="logout()">Logout</button>
    </div>

    <div class="ticket">
      <h2 style="font-size:20px;">🎟 Ticket Confirmed</h2>
      <p id="ticketDetails"></p>
      <button onclick="downloadTicket()">Download Ticket</button>
      <button onclick="goHome()">Back to Home</button>
    </div>
  </div>

  <!-- HISTORY -->
  <div id="historyPage" class="home">
    <div class="navbar">
      <h2>Eventora</h2>
      <button onclick="goHome()">Home</button>
    </div>

    <h2 class="title">Booking History</h2>
    <div id="historyContainer" class="events"></div>
  </div>

  <script src="script.js"></script>
</body>

</html>
